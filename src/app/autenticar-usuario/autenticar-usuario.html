<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow-lg border-0 overflow-hidden w-100" style="max-width: 1000px;">
        <div class="row g-0">

            <!-- Lado esquerdo -->
            <div class="col-md-6 bg-light d-flex flex-column justify-content-center p-5">
                <img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=900&q=80"
                    alt="Controle de finanças pessoais" class="img-fluid rounded mb-4" />

                <h2 class="fw-bold mb-3">
                    Web Finanças
                </h2>

                <p class="lead text-muted mb-0">
                    Controle de finanças pessoais de forma simples, moderna e eficiente.
                    Organize seus gastos, acompanhe suas receitas e tenha mais clareza sobre sua vida financeira.
                </p>
            </div>

            <!-- Lado direito -->
            <div class="col-md-6 d-flex align-items-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <h3 class="fw-bold mb-2">Entrar na sua conta</h3>
                        <p class="text-muted mb-0">
                            Acesse o Web Finanças para continuar.
                        </p>
                    </div>

                    <form [formGroup]="formAutenticar" (ngSubmit)="autenticar()">

                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email"
                                placeholder="seuemail@exemplo.com" formControlName="email" />
                        </div>

                        <div class="mb-4">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control form-control-lg" id="senha" name="senha"
                                placeholder="Digite sua senha" formControlName="senha" />
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Entrar
                            </button>
                        </div>

                        <div class="text-center">
                            <span class="text-muted">Ainda não tem uma conta?</span>
                            <a href="#" class="text-decoration-none fw-semibold">
                                Criar minha conta
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
